<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Axis Auth</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: { primary: '#F5F1EB', cream: '#FAF7F2', light: '#E8E1D9' },
                        brown: { primary: '#8B6F47', dark: '#4A3B2A', sec: '#6B5B4D' },
                        black: { soft: '#1A1A1A' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    backgroundImage: {
                        'hero-pattern': 'url("data:image/svg+xml,%3Csvg width=\'40\' height=\'40\' viewBox=\'0 0 40 40\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M0 0h40v40H0V0zm1 1h38v38H1V1z\' fill=\'%238B6F47\' fill-opacity=\'0.05\' fill-rule=\'evenodd\'/%3E%3C/svg%3E")',
                    },
                    boxShadow: { 'soft': '0 10px 40px -10px rgba(139, 111, 71, 0.1)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="auth.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-beige-primary text-black-soft min-h-screen flex items-center justify-center font-sans relative overflow-hidden bg-hero-pattern">

    <!-- Background Accents (Brown/Beige blobs) -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brown-primary rounded-full blur-[120px] opacity-10 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brown-dark rounded-full blur-[120px] opacity-10 pointer-events-none"></div>

    <div class="bg-white/80 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-soft border border-beige-light relative z-10 transition-all duration-300">
        
        <!-- Toggle Tabs -->
        <div class="flex justify-between items-center bg-beige-light/50 p-1.5 rounded-xl mb-8">
            <button id="tab-login" class="w-1/2 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm text-brown-dark transition-all">Login</button>
            <button id="tab-signup" class="w-1/2 py-2 text-sm font-semibold rounded-lg text-brown-sec hover:text-brown-primary transition-all bg-transparent">Sign Up</button>
        </div>

        <h2 id="form-title" class="text-3xl font-bold mb-2 text-center text-brown-dark">Welcome Back</h2>
        <p id="form-subtitle" class="text-sm text-brown-sec text-center mb-8">Log in to your 3D workspace.</p>

        <!-- Programmatic Google Auth Button Container -->
        <div id="google-btn-container" class="w-full flex justify-center mb-6"></div>

        <div class="flex items-center my-6">
            <hr class="flex-grow border-beige-light">
            <span class="px-3 text-xs text-brown-sec uppercase tracking-widest font-bold">Or</span>
            <hr class="flex-grow border-beige-light">
        </div>

        <!-- Custom Error Notification -->
        <div id="auth-error" class="hidden text-red-600 text-sm font-medium text-center mb-4 bg-red-50 p-3 rounded-xl border border-red-100"></div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-bold text-brown-sec uppercase tracking-wide mb-1.5 ml-1">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com"
                    class="w-full bg-beige-cream border border-beige-light rounded-xl px-4 py-3.5 text-black-soft placeholder-brown-sec/50 focus:outline-none focus:border-brown-primary focus:ring-1 focus:ring-brown-primary transition-colors">
            </div>
            
            <div class="pt-2">
                <label for="password" class="block text-xs font-bold text-brown-sec uppercase tracking-wide mb-1.5 ml-1">Password</label>
                <input type="password" id="password" required minlength="8" placeholder="••••••••"
                    class="w-full bg-beige-cream border border-beige-light rounded-xl px-4 py-3.5 text-black-soft placeholder-brown-sec/50 focus:outline-none focus:border-brown-primary focus:ring-1 focus:ring-brown-primary transition-colors">
                <p id="pwd-req" class="text-xs font-medium mt-1.5 ml-1 hidden">Must be at least 8 characters.</p>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 mt-8 bg-brown-primary hover:bg-brown-dark text-beige-cream rounded-xl font-bold shadow-soft transform transition hover:-translate-y-0.5 flex justify-center items-center gap-2">
                <span>Continue with Email</span>
                <!-- Spinner SVG -->
                <svg id="submit-spinner" class="animate-spin h-5 w-5 text-beige-cream hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
             </button>
        </form>
    </div>

    <!-- JS Logic -->
    <script src="auth.js"></script>
</body>
</html>
